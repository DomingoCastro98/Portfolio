<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Cuerpo del teclado -->
  <rect x="8" y="20" width="84" height="60" rx="6" fill="#1f2430" stroke="#1f2430" stroke-width="1"/>
  
  <!-- Área interior del teclado -->
  <rect x="12" y="24" width="76" height="52" rx="4" fill="#2a3139"/>
  
  <!-- Fila superior de teclas (números) -->
  <rect x="15" y="28" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="23" y="28" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="31" y="28" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="39" y="28" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="47" y="28" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="55" y="28" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="63" y="28" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="71" y="28" width="6" height="6" rx="1" fill="#c64f3d"/>
  
  <!-- Fila segunda de teclas (QWERTY) -->
  <rect x="15" y="37" width="6" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="23" y="37" width="6" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="31" y="37" width="6" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="39" y="37" width="6" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="47" y="37" width="6" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="55" y="37" width="6" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="63" y="37" width="6" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="71" y="37" width="6" height="6" rx="1" fill="#2f6f8f"/>
  
  <!-- Fila tercera de teclas (ASDF) -->
  <rect x="15" y="46" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="23" y="46" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="31" y="46" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="39" y="46" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="47" y="46" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="55" y="46" width="6" height="6" rx="1" fill="#c64f3d"/>
  <rect x="63" y="46" width="6" height="6" rx="1" fill="#c64f3d"/>
  
  <!-- Fila cuarta (ZXCV + Espacio) -->
  <rect x="15" y="55" width="6" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="23" y="55" width="6" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="31" y="55" width="6" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="39" y="55" width="20" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="63" y="55" width="6" height="6" rx="1" fill="#2f6f8f"/>
  <rect x="71" y="55" width="6" height="6" rx="1" fill="#2f6f8f"/>
</svg>